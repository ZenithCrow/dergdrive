name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: latest

      - name: Build
        run: zig build -Dserver

      - name: Test
        run: zig build -Dserver test
